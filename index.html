<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Especial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="tela-convite" class="convite-card">
        <h1>Oii Meu bem, tá bem?</h1>
        <p class="subtitulo">Quero te convidar para meu aniversário, Pq eu quero passar ele com vc ❤️ </p>
        <p class="subtitulo">Mas eu preciso saber se vc vai poder ir.... a data seria no dia 18 desse mês</p>
        <p class="subitiulo">Mas nâo tenha pressa tbm, responde no seu tempo ok?</p>
        
        <div class="botoes-container">
            <button id="btn-sim" class="btn btn-sim">Sim, com certeza! ✨</button>
            <button id="btn-talvez" class="btn btn-talvez">Não sei ainda 🤔</button>
            <button id="btn-nao" class="btn btn-nao">Não vai dar 😢</button>
        </div>
    </div>

    <div id="tela-resultado" class="convite-card resultado-card">
        <div class="conteudo-resultado">
            <img id="resultado-imagem" class="resultado-imagem" src="" alt="Resposta">
            <p id="resultado-texto" class="resultado-texto"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
